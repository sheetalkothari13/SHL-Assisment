services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # You will paste the real key in the Render dashboard
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./shl_assessment.db
    disk:
      name: shl-db
      mountPath: /opt/render/project/src
      sizeGB: 1             # Free 1 GB persistent disk keeps the SQLite file alive
